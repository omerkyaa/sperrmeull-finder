# Firebase BOM
firebase-bom = "32.6.0"

# Networking & Serialization
okhttp = "4.12.0"
retrofit = "2.9.0"
kotlinx-serialization = "1.6.1"

# Image Loading
landscapist-glide = "2.2.10"
