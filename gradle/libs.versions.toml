[versions]
# Core Android
compileSdk = "34"
minSdk = "24"
targetSdk = "34"
versionCode = "1"
versionName = "1.0.0"

# Kotlin & JVM
kotlin = "1.9.20"
jvmTarget = "17"
kotlinCompilerExtensionVersion = "1.5.5"
ksp = "1.9.20-1.0.14"

# Java 8+ API Desugaring
desugar-jdk-libs = "2.0.4"

# Android Gradle Plugin
androidGradlePlugin = "8.13.0"

# AndroidX Core
core-ktx = "1.12.0"
